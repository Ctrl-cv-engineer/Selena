version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: selena-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data_docker:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 可选：将 Selena 主程序也容器化运行。
  # 默认注释掉，因为大多数开发者倾向于在宿主机直接 `python -m DialogueSystem.main`。
  # 启用前请确保 config.json 中 Qdrant_Setting.host = "qdrant"（容器内服务名）。
